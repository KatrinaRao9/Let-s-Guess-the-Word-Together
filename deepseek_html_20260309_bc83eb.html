<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂随机抽查 · 不重复单词库</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 40px -10px rgba(0,20,40,0.25), 0 2px 8px rgba(0,0,0,0.05);
            padding: 36px 32px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b2b3b;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            border-left: 7px solid #2b7a8a;
            padding-left: 22px;
        }
        .subhead {
            font-size: 1rem;
            color: #3e6575;
            margin-bottom: 28px;
            padding-left: 30px;
            font-weight: 400;
            border-bottom: 1px dashed #b3cdd9;
            padding-bottom: 12px;
        }
        .word-display {
            background: #ffffffd9;
            border-radius: 60px;
            padding: 40px 30px;
            margin: 16px 0 24px 0;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 15px 25px -12px #1f4b5f33;
            border: 1px solid white;
        }
        .current-word {
            font-size: 5.5rem;
            font-weight: 600;
            line-height: 1.2;
            color: #0d3c4f;
            word-break: break-word;
            hyphens: auto;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
            letter-spacing: -0.01em;
        }
        .placeholder-word {
            font-size: 2.4rem;
            font-weight: 400;
            color: #98b8c9;
            opacity: 0.8;
        }
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #c7dee9a8;
            border-radius: 100px;
            padding: 12px 20px;
            margin: 20px 0 28px 0;
            backdrop-filter: blur(4px);
            font-size: 1rem;
            font-weight: 500;
            color: #1b5266;
            border: 1px solid #eaf3f8;
        }
        .progress {
            background: #ffffffba;
            border-radius: 80px;
            padding: 5px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #135f77;
            box-shadow: 0 2px 4px #0000000d;
        }
        .progress strong {
            font-size: 1.2rem;
            margin: 0 4px;
            color: #053b4a;
        }
        .counter-text {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            background-color: #2b7a8a;
            color: white;
            border-radius: 40px;
            padding: 4px 16px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
        }
        .btn {
            border: none;
            background: white;
            padding: 14px 30px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 550;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,40,50,0.15);
            transition: 0.15s ease;
            border: 1px solid rgba(255,255,255,0.7);
            flex: 0 1 auto;
            min-width: 160px;
            color: #154f61;
        }
        .btn-primary {
            background: #fee8d7;
            color: #1e4e5f;
            border: 1px solid #ffcfb0;
            font-weight: 600;
        }
        .btn-primary:hover:not(:disabled) {
            background: #ffd6bb;
            box-shadow: 0 10px 20px -5px #b3562b80;
            transform: scale(1.02);
            border-color: #febc93;
        }
        .btn-secondary {
            background: #f2faff;
            border: 1px solid #b9d9ec;
            color: #1e5770;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #e3f2fa;
            box-shadow: 0 6px 14px #1f596e33;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px #0b3f4e4d;
        }
        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            background: #d1e2eb;
            border-color: #b1cbd8;
            color: #4e6f7e;
        }
        .restart-icon {
            font-size: 1.2rem;
        }
        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #578696;
            border-top: 1px solid #cbdee9;
            padding-top: 20px;
        }
        .footer-note code {
            background: #ddeef7;
            padding: 4px 10px;
            border-radius: 30px;
            color: #104b5e;
        }
        .word-list-summary {
            background: #ffffffb0;
            border-radius: 50px;
            padding: 14px 22px;
            margin: 20px 0 5px;
            font-size: 0.95rem;
            color: #1b4a58;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid #b6d3e2;
            backdrop-filter: blur(2px);
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }
        .word-chip {
            background: #ecf5f9;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.9rem;
            color: #144e62;
            border: 1px solid #cae0eb;
        }
        .word-chip.used {
            background: #bdd6e4;
            color: #305f71;
            text-decoration: line-through 1.5px #236277;
            opacity: 0.7;
            order: 1;
        }
        .completion-message {
            background: #fad7b3;
            border-radius: 40px;
            padding: 12px 28px;
            margin: 10px 0 0;
            font-size: 1.1rem;
            color: #281e0e;
            font-weight: 500;
            border-left: 6px solid #d2834b;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📋 抽词 · 不重复课堂抽查</h1>
    <div class="subhead">基于「3.18单词库」 · 已抽单词不会重复出现</div>

    <!-- 当前抽取单词醒目展示 -->
    <div class="word-display" id="wordDisplay">
        <div class="current-word" id="currentWordLabel">✨ 点击抽取</div>
    </div>

    <!-- 进度与统计 -->
    <div class="status-bar">
        <div class="counter-text">
            <span class="badge">📌 剩余可抽</span>
            <span class="progress" id="remainingCount">-- / --</span>
        </div>
        <div class="counter-text">
            <span class="badge">✅ 已抽取</span>
            <span class="progress" id="usedCount">0</span>
        </div>
    </div>

    <!-- 主要操作按钮组 -->
    <div class="btn-group">
        <button class="btn btn-primary" id="drawBtn">🎲 抽一个单词</button>
        <button class="btn btn-secondary" id="resetBtn">⟲ 重新开始</button>
    </div>

    <!-- 全部单词状态一览 (仅显示前30个作为预览，并标记已使用) -->
    <div class="word-list-summary" id="wordListPreview">
        <!-- 动态渲染所有单词小圆片 -->
    </div>

    <!-- 完成全部抽取时显示彩蛋提示 -->
    <div id="completionMessage" class="completion-message" style="display: none;">
        🎉 太棒了！所有单词都已抽过一遍。点击“重新开始”再来一轮。
    </div>

    <div class="footer-note">
        <code>📦 共导入 <span id="totalWordCount"></span> 个单词 · 无重复抽取，直到抽完</code>
    </div>
</div>

<script>
(function() {
    // ---------- 从导入的 Excel 数据中提取单词 (已去重但保留原始顺序, 保持与表格一致) ----------
    // 手动整理表格中所有可见单元格 (根据提供的表格区域 A1 到 D??，每个非空单元格都是一个单词)
    // 为了精准，我们把所有单元格按行扫描, 去除完全空白项，同时保留重复项 (表格内 Christmas 出现两次，依样保留)
    // 但要求“每次抽取一个单词，已抽过不再重复” 针对的是独立的位置/实例还是单词去重？
    // 解释: 如果同一个单词出现两次(如Christmas)，应该被视为两个独立的抽词项（出现两次就可以被抽两次，直到所有项耗尽）
    // 这样更符合原始表格的“每一个单元格” 作为一个抽词单位。并且用户说“导入所有的单词，每次随时抽取一个单词并且不重复抽取”
    // 通常单元格里每个词都是独立的抽词单元，重复出现意味着有两个相同拼写的抽词机会。我们用数组保留所有单元格内容（含重复）。
    // 更稳健：直接构建一个数组，把表格内所有非空字符串纳入 (忽略空格)
    const rawMatrix = [
        ["meeting","appreciate","Christmas","begin"],
        ["deadline","whiteboard","Halloween","hotpot"],
        ["coffee","RoboNeo","Thanksgiving Day","mooncake"],
        ["computer","social media","ticket","bed sheet"],
        ["photographer","slogan","perfume","pillow"],
        ["driver","passion","exhibition","mouse"],
        ["chair","challenge","promotion","asset"],
        ["write","status quo","stress","patent"],
        ["hungry","makeup","understand","phone case"],
        ["bicycle","Christmas","garbage","charger"],   // 注意第二个 Christmas
        ["screen","sticky note","wrinkles","balloon"],
        ["holiday","skin","percentage","boundary"],
        ["dumpling","interview","sparkling water","gap"],
        ["Chinese","competitor","mirror",""],          // 空白占位，忽略
        ["brain","influencer","elevator",""],
        ["request","agree","projector",""],
        ["Wink","library","invite",""],
        ["design","washroom","university",""],
        ["BeautyPlus","female","translate",""],
        ["schedule","male","vote",""],
        ["presentation","gym","clarify",""],
        ["customer","soccer","straight",""],
        ["client","Thailand","estimate",""],
        ["team","Vietnam","skip",""],
        ["project","Malaysia","feedback",""],
        ["introduce","waterbottle","crucial",""],
        ["revenue","earphone","contract",""],
        ["success","bug","policy",""],
        ["password","coding","advice",""],
        ["expense","email","delay",""],
        ["request","department","luggage",""],
        ["bank","English","foreign",""],
        ["investment","camera","hand cream",""],
        ["rule","power bank","whipping cream",""],
        ["risk","tennis","interrupt",""],
        ["milestone","badminton","construction",""],
        ["timeline","sunglass","microphone",""],
        ["departure","heartbeat","break up",""],
        ["technology","March","parking lot",""],
        ["feedback","September","negative",""],
        ["government","latte","outsourcing",""],
        ["social","oat milk","customer service",""],
        ["environment","convergence","lobby",""],
        ["opinion","business class","European",""],
        ["brainstorm","optimization","operation",""],
        ["front desk","sandwich","administration",""],
        ["globalization","pasta","business trip",""],
        ["stock","weakness","interesting",""],
        ["limited","strength","offer",""],
        ["collaborate","advantage","concern",""]
    ];

    // 扁平化并过滤掉空字符串（如尾部占位的""）以及可能仅含空格的项目
    let allWords = [];
    for (let row of rawMatrix) {
        for (let cell of row) {
            // 如果单元格是字符串且去除首尾空格后不为空，则保留原始形式 (保留内部空格如"social media")
            if (cell && typeof cell === 'string' && cell.trim() !== '') {
                // 但有些单元格可能是空字符串，直接跳过
                allWords.push(cell.trim());   // 去除前后空格，但保留中间空格
            }
        }
    }

    // 特殊情况：最后几行可能还有遗漏？根据可见表格从A到D，最后几行包含了完整的。检查末尾“offer”“concern”都在。
    // 手动确保 “customer service” “business trip” 等均已收录。现在做下去重逻辑？注意包含重复Christmas已经保留两次。
    // 如果想要去重按唯一单词抽，则改用Set。但描述是“导入所有的单词，每次抽取一个，不重复抽取”，如果单词相同但不同单元格，按常规理解是一个单词位置。
    // 大多数课堂抽查希望一个单词只出现一次，即使表格里写了两次也视为同一个单词。但既然表格出现了两次Christmas，可能代表两个不同抽词机会？
    // 为了更符合“所有单词”且避免冗余感，我提供两种模式？但需求明确说“根据上面的单词列表”，列表里Christmas出现两次，也许就是两个独立项。
    // 我们可以让使用者自行决定，但最简单的实现是保留原始数组，包含重复，这样抽完重复词需要两轮。
    // 同时让进度显示更精确。为尊重原始数据，采用保留重复项方案。若老师想唯一，可以后续去重。我们可以增加一个“去重模式”切换，但本次先实现原始模式。
    // 但观察表格，后面还有“request”出现两次 (第16行和第31行)？是的，request出现了两次，同样保持不变。
    // 最终数组 allWords 就是原始单词库含重复。调试确认数量。可以先计算length并在页面显示。

    // 数据准备：去空白已在上面完成。过滤掉仅空字符串后，我们重建一下数组避免空位。
    const wordBank = allWords;   // 例如 ["meeting","appreciate","Christmas","begin", ... ,"concern"]

    // 为了界面简洁，我们在word-list-summary里展示所有单词的小圆片（标记是否已使用）
    // 状态管理
    let remainingIndices = [];            // 未抽取过的索引池 (存索引)
    let usedIndices = [];                 // 已抽取的索引 (顺序记录)
    let currentWord = '';                 // 最近抽取的单词

    // 初始化：将所有索引填入remainingIndices (0 到 wordBank.length-1)
    function resetGame() {
        // 生成索引列表 0 ... N-1
        remainingIndices = Array.from({ length: wordBank.length }, (_, i) => i);
        // 随机打乱一次，增加不可预测性 (也可以保持顺序，但随机抽取时更自然)
        shuffleArray(remainingIndices);
        usedIndices = [];
        currentWord = '';
        updateUI();
    }

    // Fisher-Yates 洗牌
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    // 抽取一个新单词 (从不重复池里随机弹出一个)
    function drawWord() {
        if (remainingIndices.length === 0) {
            // 全部抽完了，可以显示提示，禁用按钮（通过UI控制）
            // 但按钮disabled状态依赖长度判断，我们调用UI更新即可
            updateUI();
            return '';
        }

        // 从remainingIndices随机选一个索引 (因为之前已经洗牌，也可以直接pop最后一个，更高效且保证随机)
        // 但是为了保留“随时随机”的观感，我们还是每次随机选一个位置并与最后一个交换再pop，保证概率均等且不重复。
        // 简单起见: 随机选一个下标
        const randomPos = Math.floor(Math.random() * remainingIndices.length);
        const selectedIndex = remainingIndices[randomPos];
        // 从remainingIndices移除该元素 (交换pop)
        const lastIndex = remainingIndices.length - 1;
        [remainingIndices[randomPos], remainingIndices[lastIndex]] = [remainingIndices[lastIndex], remainingIndices[randomPos]];
        const idx = remainingIndices.pop();   // 选中的索引

        usedIndices.push(idx);
        currentWord = wordBank[idx];
        updateUI();
        return currentWord;
    }

    // 更新所有UI组件
    function updateUI() {
        // 更新当前单词显示
        const wordLabel = document.getElementById('currentWordLabel');
        if (currentWord) {
            wordLabel.textContent = currentWord;
            wordLabel.className = 'current-word'; // 移除placeholder样式
        } else {
            wordLabel.textContent = '✨ 点击抽取';
            wordLabel.className = 'current-word placeholder-word';
        }

        // 更新剩余/已用计数
        const remainingCount = remainingIndices.length;
        const total = wordBank.length;
        const usedCount = usedIndices.length;

        document.getElementById('remainingCount').innerHTML = `<strong>${remainingCount}</strong> / ${total}`;
        document.getElementById('usedCount').innerHTML = `<strong>${usedCount}</strong>`;
        document.getElementById('totalWordCount').innerText = total;

        // 绘制单词预览圆片 (全部单词，并用样式标记已使用的)
        const previewContainer = document.getElementById('wordListPreview');
        previewContainer.innerHTML = ''; // 清空

        // 为提高可读性，限制显示数量太多？但全部展示会让容器滚动，我们全部显示，设了最大高度。
        for (let i = 0; i < wordBank.length; i++) {
            const chip = document.createElement('span');
            chip.className = 'word-chip';
            chip.textContent = wordBank[i];
            // 检查是否已被使用
            if (usedIndices.includes(i)) {
                chip.classList.add('used');
            }
            previewContainer.appendChild(chip);
        }

        // 控制抽取按钮禁用 (如果剩余为0)
        const drawBtn = document.getElementById('drawBtn');
        drawBtn.disabled = (remainingCount === 0);

        // 完成抽取信息显示
        const completionDiv = document.getElementById('completionMessage');
        if (remainingCount === 0 && total > 0) {
            completionDiv.style.display = 'block';
        } else {
            completionDiv.style.display = 'none';
        }
    }

    // 事件绑定
    document.getElementById('drawBtn').addEventListener('click', function() {
        drawWord();
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        resetGame();
        // 重置后 currentWord 清空
        currentWord = '';
        updateUI();  // reset里已调用updateUI，但再次保证
    });

    // 启动时初始化
    resetGame();

    // 额外优化：如果用户连续点击抽取，动作正常。剩余0时按钮禁用。
    // 处理边缘情况，空库时禁用所有，但wordBank有长度.
    // 加一个DOMContentLoaded安全
})();
</script>
</body>
</html>
